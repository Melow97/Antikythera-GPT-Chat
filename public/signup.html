<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign up — Antikythera GPT Chat</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg" />
<link rel="stylesheet" href="/landing.css" />
<link rel="stylesheet" href="/auth.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <a href="/" class="auth-brand">
      <img src="/logo.svg" alt="" />
      Antikythera GPT Chat
    </a>
    <h1>Create your account</h1>

    <div id="authError" class="auth-error hidden"></div>

    <form class="auth-form" id="signupForm">
      <div class="auth-row">
        <div class="auth-field">
          <label for="firstName">First name</label>
          <input type="text" id="firstName" autocomplete="given-name" required maxlength="80" />
        </div>
        <div class="auth-field">
          <label for="lastName">Last name</label>
          <input type="text" id="lastName" autocomplete="family-name" required maxlength="80" />
        </div>
      </div>
      <div class="auth-field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" required />
      </div>
      <div class="auth-field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="new-password" required minlength="8" />
        <p class="auth-hint">At least 8 characters.</p>
      </div>
      <button type="submit" class="auth-submit" id="submitBtn">Create account</button>
    </form>

    <div class="auth-divider">or</div>

    <a href="/login/google/start" class="auth-google-btn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.52 12.27c0-.79-.07-1.54-.2-2.27H12v4.3h6.47c-.28 1.5-1.13 2.77-2.4 3.62v3.01h3.88c2.27-2.09 3.57-5.17 3.57-8.66Z"/><path fill="#34A853" d="M12 24c3.24 0 5.95-1.08 7.94-2.92l-3.88-3a7.4 7.4 0 0 1-4.06 1.15c-3.12 0-5.77-2.11-6.71-4.95H1.28v3.1A12 12 0 0 0 12 24Z"/><path fill="#FBBC05" d="M5.29 14.28a7.2 7.2 0 0 1 0-4.56v-3.1H1.28a12 12 0 0 0 0 10.76l4.01-3.1Z"/><path fill="#EA4335" d="M12 4.77c1.76 0 3.35.6 4.6 1.8l3.44-3.44C17.94 1.19 15.24 0 12 0 7.31 0 3.26 2.69 1.28 6.62l4.01 3.1C6.23 6.88 8.88 4.77 12 4.77Z"/></svg>
      Continue with Google
    </a>

    <p class="auth-switch">Already have an account? <a href="/login.html">Log in</a></p>
  </div>
</div>

<script src="/auth.js"></script>
</body>
</html>
