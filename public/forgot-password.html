<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset password — Antikythera GPT Chat</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg" />
<link rel="stylesheet" href="/landing.css" />
<link rel="stylesheet" href="/auth.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <a href="/" class="auth-brand">
      <img src="/logo.svg" alt="" />
      Antikythera GPT Chat
    </a>
    <h1>Reset your password</h1>
    <p class="auth-hint" style="margin: -14px 0 18px; text-align: center;">
      Enter your account email and we'll send you a reset link.
    </p>

    <div id="authError" class="auth-error hidden"></div>
    <div id="authSuccess" class="auth-error hidden" style="background: rgba(116,173,126,0.15); border-color: #74ad7e; color: #74ad7e;"></div>

    <form class="auth-form" id="forgotForm">
      <div class="auth-field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" required />
      </div>
      <button type="submit" class="auth-submit" id="submitBtn">Send reset link</button>
    </form>

    <p class="auth-switch">Remembered it? <a href="/login.html">Log in</a></p>
  </div>
</div>

<script src="/auth.js"></script>
</body>
</html>
