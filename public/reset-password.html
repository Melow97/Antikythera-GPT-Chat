<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Set a new password — Antikythera GPT Chat</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg" />
<link rel="stylesheet" href="/landing.css" />
<link rel="stylesheet" href="/auth.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <a href="/" class="auth-brand">
      <img src="/logo.svg" alt="" />
      Antikythera GPT Chat
    </a>
    <h1>Set a new password</h1>

    <div id="authError" class="auth-error hidden"></div>

    <form class="auth-form" id="resetForm">
      <div class="auth-field">
        <label for="password">New password</label>
        <input type="password" id="password" autocomplete="new-password" required minlength="8" />
        <p class="auth-hint">At least 8 characters.</p>
      </div>
      <button type="submit" class="auth-submit" id="submitBtn">Set new password</button>
    </form>

    <p class="auth-switch"><a href="/login.html">Back to log in</a></p>
  </div>
</div>

<script src="/auth.js"></script>
</body>
</html>
